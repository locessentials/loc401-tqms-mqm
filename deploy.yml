name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build script
        run: node build.js

      # The deploy folder combines the interactive shell (index.html, course.js,
      # course.css, course.json, assets, content/) with the pre-rendered static
      # pages (_static/) so both the dynamic and static versions are served.
      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy
          # Copy the dynamic shell and all source files
          cp index.html course.js course.css course.json llms.txt sitemap.xml _deploy/
          cp -r assets _deploy/assets 2>/dev/null || true
          cp -r content _deploy/content
          # Copy pre-rendered static HTML pages
          cp -r _static _deploy/_static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
